apiVersion: v1
kind: ServiceAccount
metadata:
  namespace: code-explainer
  name: code-explainer
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: code-explainer
  name: code-explainer
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  namespace: code-explainer
  name: code-explainer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: code-explainer
subjects:
- kind: ServiceAccount
  name: code-explainer
  namespace: code-explainer
