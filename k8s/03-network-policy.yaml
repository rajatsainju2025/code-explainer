apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  namespace: code-explainer
  name: code-explainer-network-policy
spec:
  podSelector:
    matchLabels:
      app: code-explainer-api
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8000
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 5432  # PostgreSQL
    - protocol: TCP
      port: 6379  # Redis
    - protocol: TCP
      port: 9090  # Prometheus
  - to:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 53   # DNS
